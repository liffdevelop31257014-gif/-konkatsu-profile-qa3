<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>婚活自己開示QA Part3</title>

<link rel="stylesheet" href="style.css"/>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<div class="container">

 <!-- タイトル -->
 <div class="form-header">

   <h1>婚活 自己開示QA Part3</h1>

   <p class="form-description">
     本アンケートは、婚活・交際前の自己開示を目的としています。<br>
     プライバシー保護：LINE IDはハッシュ化（暗号化）して保存されます。表示名・プロフィール画像・メールアドレスなどは取得されません。<br>
     再回答について：同じLINEアカウントから回答された場合、以前の内容は上書きされます。
   </p>

 </div>

 <!-- Q1 -->
 <label>Q1 会社でどんなことを褒められますか？また、注意されることはなんですか？</label>

<textarea
  id="q1good"
  class="detail-textarea"
  placeholder="褒められること"
></textarea>

<textarea
  id="q1bad"
  class="detail-textarea"
  placeholder="注意されること"
></textarea>


 <!-- Q2 -->
 <label>友人や元恋人からどんなことを褒められますか？また、注意されることはなんですか？</label>
 <textarea
  id="q2good"
  class="detail-textarea"
  placeholder="褒められること"
></textarea>

<textarea
  id="q2bad"
  class="detail-textarea"
  placeholder="注意されること"
></textarea>

 <!-- Q3 -->
 <label>
   Q3 次の働き方・休暇について、もし実現できたら嬉しい順に選択してください。<br>
ただし、給料や日々の残業などは今と変わらないものとして考えてください。<br>
（タップした順番が順位になります）
 </label>
 <div id="q3Ranking" class="ranking-group">

<button type="button" class="rank-option" data-value="水土日の週休3日制">
<span class="rank-number"></span>
水土日の週休3日制
</button>

<button type="button" class="rank-option" data-value="金土日の週休3日制">
<span class="rank-number"></span>
金土日の週休3日制
</button>

<button type="button" class="rank-option" data-value="休みは変わらず1日の労働時間が5～6時間になる">
<span class="rank-number"></span>
休みは変わらず1日の労働時間が5～6時間になる
</button>

<button type="button" class="rank-option" data-value="大型連休の回数が増える">
<span class="rank-number"></span>
大型連休の回数が増える
</button>

<button type="button" class="rank-option" data-value="まるまる1ヶ月GWになる">
<span class="rank-number"></span>
まるまる1ヶ月GWになる 
</button>

</div>

 <!-- Q4 -->
 <label>
   Q4 次の中でも手に入るとしたら嬉しい順に選択ください。<br>
（タップした順番が順位になります）
 </label>

<div id="q4Ranking" class="ranking-group">

<button type="button" class="rank-option" data-value="老若男女問わず褒められる">
<span class="rank-number"></span>
老若男女問わず褒められる
</button>

<button type="button" class="rank-option" data-value="食事や運動に気をつけなくても維持できる理想的な体型">
<span class="rank-number"></span>
食事や運動に気をつけなくても維持できる理想的な体型
</button>

<button type="button" class="rank-option" data-value="地頭の良さ">
<span class="rank-number"></span>
地頭の良さ
</button>

<button type="button" class="rank-option" data-value="運動神経">
<span class="rank-number"></span>
運動神経
</button>

<button type="button" class="rank-option" data-value="お金を稼ぐ能力の高さ">
<span class="rank-number"></span>
お金を稼ぐ能力の高さ
</button>

<button type="button" class="rank-option" data-value="誰とでもすぐ打ち解けられ好かれるコミュニケーション能力">
<span class="rank-number"></span>
誰とでもすぐ打ち解けられ好かれるコミュニケーション能力
</button>

<button type="button" class="rank-option" data-value="アルコールへの耐性">
<span class="rank-number"></span>
アルコールへの耐性
</button>

<button type="button" class="rank-option" data-value="体力">
<span class="rank-number"></span>
体力 
</button>

<button type="button" class="rank-option" data-value="何があっても落ち込まないメンタルの強さ">
<span class="rank-number"></span>
何があっても落ち込まないメンタルの強さ
</button>

</div>

 <!-- Q5 -->
 <label>Q5 結婚したら2人でしたいことは何ですか？</label>
 <textarea id="q5"></textarea>

 <!-- Q6 -->
 <label>Q6 子どもが生まれたら家族でしたいことは何ですか？</label>
  <textarea id="q6"></textarea>

 <!-- Q7 -->
 <label>
   Q7 小学校低学年の息子がいます。学校での様子を聞くと友人もいて楽しく過ごしているようです。<br>
学校終わりや週末は家の中で1人でゲームをしたり動画を見ているだけなので習い事に通わせようか迷っています。<br>
本人には習い事に興味がないか聞きましたが、今は興味がないと言われました。<br>
このときどうしますか？
 </label>

  <label>
   <input type="radio" name="q7" value="a7-1">
   同年代男子に人気な習い事を調べていくつか見学に連れて行く
 </label>

 <label>
   <input type="radio" name="q7" value="a7-2">
   同年代男子に人気な習い事を調べて資料を見せる
 </label>

 <label>
   <input type="radio" name="q7" value="a7-3">
   自分が過去に通っていた習い事の話をしてみる
 </label>

 <label>
   <input type="radio" name="q7" value="a7-4">
   興味がわいたら通わせられるように準備をしつつ今は息子にはこれ以上声かけはしない
 </label>

  <label>
   <input type="radio" name="q7" value="a7-5">
   子どもをもつことは考えていない
 </label>

 <!-- Q8 -->
 <label>Q8 高校生の娘がいます。この子は今まで非行に走ったことなどはありません。<br>
たまたま夫婦ともに夜遅くなる日ができてしまいました。<br>
いつもは娘の塾が21時に終わるので迎えに行っていましたが、この日はどうしますか？</label>

<label>
   <input type="radio" name="q8" value="a8-1">
   その日だけは娘1人で帰らせる
 </label>

 <label>
   <input type="radio" name="q8" value="a8-2">
   親戚か友人などに迎えに行ってもらうように頼む
 </label>

<label>
   <input type="radio" name="q8" value="a8-3">
   送迎サービスを探し、お金を払って利用する
 </label>

 <label>
   <input type="radio" name="q8" value="a8-4">
   夫婦どちらかは間に合うように何がなんでも調整する
 </label>


 <label>
   <input type="radio" name="q8" value="a8-5">
   子どもをもつことは考えていない
 </label>

<div class="button-group">

 <button id="submitBtn" type="button">
   送信
 </button>

 <div class="sub-buttons">

   <button id="draftBtn" type="button">
     下書き保存
   </button>

   <button id="clearBtn" type="button">
     フォームクリア
   </button>

 </div>

</div>

<!-- 共有モーダル -->
<div id="shareModal" class="modal hidden">
 <div class="modal-content">

   <h3>共有</h3>

   <input
     id="shareName"
     placeholder="共有名（任意）"
   >

   <button id="shareBtn">
     共有する
   </button>

 </div>
</div>

<script src="app.js"></script>
</body>
</html>
